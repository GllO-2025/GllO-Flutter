targets:
  $default:
    builders: # generated file의 경로 설정
      source_gen:combining_builder:
        options:
          build_extensions:
            "^lib/{{dir}}/{{file_name}}.dart": "lib/{{dir}}/generated/{{file_name}}.g.dart"
      freezed:
        options:
          build_extensions:
            "^lib/{{dir}}/{{file_name}}.dart": "lib/{{dir}}/generated/{{file_name}}.freezed.dart"