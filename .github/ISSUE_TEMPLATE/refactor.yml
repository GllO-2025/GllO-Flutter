name: "🔧 Refactor"
description: "코드 리팩토링 요청 시 사용하는 템플릿"
labels:
  - refactor
body:
  - type: textarea
    attributes:
      label: "🛠️ 리팩토링 대상"
      description: "리팩토링이 필요한 코드 영역을 설명해주세요."
      placeholder: "예) UserService의 fetch 메서드"
    validations:
      required: true

  - type: checkboxes
    attributes:
      label: "✅ 작업 목록"
      description: "변경할 항목을 체크박스 형태로 작성해주세요."
      options:
        - label: "코드 구조 개선"
        - label: "중복 제거"
        - label: "변수명 정리"
        - label: "테스트 커버리지 추가"

  - type: date
    attributes:
      label: "⏳ 예상 완료일 (선택)"
      description: "리팩토링 완료를 예상하는 날짜를 입력해주세요."

