name: "✨ Feature"
description: "새로운 기능 추가 템플릿"
labels:
  - feature
body:
  - type: textarea
    attributes:
      label: "📄 설명"
      description: "새로운 기능에 대한 설명을 작성해 주세요."
      placeholder: "자세히 적을수록 좋습니다!"
    validations:
      required: true

  - type: textarea
    attributes:
      label: "✅ 작업할 내용"
      description: "할 일을 체크박스 형태로 작성해주세요."
      placeholder: "- [ ] UI 디자인 반영\n- [ ] API 연동\n- [ ] 단위 테스트 작성"
    validations:
      required: true

  - type: textarea
    attributes:
      label: "🙋🏻 참고 자료 (선택)"
      description: "설계 문서, 와이어프레임, 레퍼런스 링크 등이 있다면 입력해주세요."
      placeholder: "https://…"

  - type: input
    attributes:
      label: "⏳ 예상 완료일 (선택)"
      description: "기능 개발 완료 예상 일자를 마일스톤 형태로 입력해주세요."
      placeholder: "2025-03-01: 로그인 기능 구현 완료"
    validations:
      pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}"
