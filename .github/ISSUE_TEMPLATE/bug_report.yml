name: "🐞 Bug Report"
description: "버그 발생 시 작성하는 템플릿"
labels:
  - fix
body:
  - type: textarea
    attributes:
      label: "🐛 버그 설명"
      description: "버그가 발생한 상황을 설명해주세요."
      placeholder: "예) ○○ 버튼 클릭 시 앱이 강제 종료됩니다."
    validations:
      required: true

  - type: textarea
    attributes:
      label: "✅ 재현 방법"
      description: "버그를 재현하기 위한 단계를 순서대로 작성해주세요."
      placeholder: "1. \n2. "
    validations:
      required: true

  - type: textarea
    attributes:
      label: "📸 스크린샷 (선택)"
      description: "오류 화면이 있다면 첨부해주세요."
      placeholder: "https://…"

  - type: textarea
    attributes:
      label: "🔎 추가 정보 (선택)"
      description: "OS 버전, 환경 설정 등 기타 참고할 정보가 있다면 입력해주세요."
      placeholder: "iOS 17.4, 기기: iPhone 14"

  - type: input
    attributes:
      label: "⏳ 예상 완료일 (선택)"
      description: "이슈 해결 예상 일자를 입력해주세요."
      placeholder: "2025-03-10"
    validations:
      pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
